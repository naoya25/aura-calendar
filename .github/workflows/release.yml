name: Release DMG

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build DMG and Publish Release
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare release metadata
        id: metadata
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          VERSION_RAW="${HEAD_REF#release/}"
          VERSION_NO_V="${VERSION_RAW#v}"

          echo "tag_name=${VERSION_RAW}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"

      - name: Sync bundle version
        env:
          VERSION_NO_V: ${{ steps.metadata.outputs.version_no_v }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION_NO_V"]

          cargo_toml = Path("Cargo.toml")
          cargo_lines = cargo_toml.read_text().splitlines()
          for index, line in enumerate(cargo_lines):
              if line.strip() == '[package]':
                  for package_index in range(index + 1, len(cargo_lines)):
                      if cargo_lines[package_index].startswith('version = '):
                          cargo_lines[package_index] = f'version = "{version}"'
                          break
                  break
          cargo_toml.write_text('\n'.join(cargo_lines) + '\n')

          tauri_conf = Path('tauri.conf.json')
          config = json.loads(tauri_conf.read_text())
          config['version'] = version
          tauri_conf.write_text(json.dumps(config, ensure_ascii=False, indent=2) + '\n')
          PY

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build bundle
        run: cargo tauri build

      - name: Locate DMG
        id: bundle
        env:
          VERSION_NO_V: ${{ steps.metadata.outputs.version_no_v }}
        run: |
          set -euo pipefail

          DMG_FILE="$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [ -z "$DMG_FILE" ]; then
            echo "DMG not found under target/release/bundle/dmg"
            exit 1
          fi

          NORMALIZED_DMG="target/release/bundle/dmg/AuraCalendar_${VERSION_NO_V}_aarch64.dmg"
          if [ "$DMG_FILE" != "$NORMALIZED_DMG" ]; then
            cp "$DMG_FILE" "$NORMALIZED_DMG"
          fi

          echo "dmg_file=$NORMALIZED_DMG" >> "$GITHUB_OUTPUT"

      - name: Write release body
        env:
          VERSION_NO_V: ${{ steps.metadata.outputs.version_no_v }}
        run: |
          cat <<EOF > release_body.md
          ## 本アプリのインストール手順

          1. \`AuraCalendar_${VERSION_NO_V}_aarch64.dmg\`をダウンロード
          2. ダウンロードした\`dmg\`ファイルをダブルクリックして起動
          3. \`AuraCalendar.app\`を\`Application\`にドラッグ&ドロップ
          ![](https://raw.githubusercontent.com/naoya25/aura-calendar/main/docs/images/installer.png)

          4. \`AuraCalendar.app\`を起動
          「\"AuraCalendar.app\"は壊れているため開けません...」という警告が出ます

          5. terminalを開き以下のコマンドを実行
          \`\`\`bash
          xattr -cr /Applications/AuraCalendar.app
          \`\`\`
          6. もう一度\`AuraCalendar.app\`を開く
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          body_path: release_body.md
          files: ${{ steps.bundle.outputs.dmg_file }}
